  <text x="524" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#486581">ReAct node</text>

  <rect x="758" y="162" width="360" height="164" rx="24" fill="#FCE7D8" stroke="#243B53" stroke-width="3"/>
  <text x="938" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#102A43">Retrieval Tools</text>
  <text x="938" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#243B53">examples + docs</text>

  <rect x="758" y="428" width="360" height="164" rx="24" fill="#FCE7D8" stroke="#243B53" stroke-width="3"/>
  <text x="938" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#102A43">Execution Tools</text>
  <text x="938" y="552" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#243B53">Julia, shell, files</text>

  <rect x="1174" y="246" width="398" height="278" rx="26" fill="#F2E8F5" stroke="#243B53" stroke-width="3"/>
  <text x="1373" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#102A43">Observe + Update</text>
  <text x="1373" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#243B53">read tool outputs</text>
  <text x="1373" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#243B53">continue or stop</text>
  <text x="1373" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#486581">control loop</text>

  <rect x="1306" y="648" width="138" height="102" rx="20" fill="#E7F4EC" stroke="#243B53" stroke-width="3"/>
  <text x="1375" y="714" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#102A43">DONE</text>

