    <marker id="arrow-gold" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#B26A00"/>
