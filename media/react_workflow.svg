  <path d="M1274 572 C1186 742 834 760 658 552" stroke="#B26A00" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 10" fill="none" marker-end="url(#arrow-gold)"/>

  <text x="860" y="850" text-anchor="middle" font-family="Arial, sans-serif" font-size="31" fill="#7C5E10">Observations feed back into reasoning until the agent decides the task is done.</text>
