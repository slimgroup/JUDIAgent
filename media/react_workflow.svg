  <rect width="1720" height="920" rx="32" fill="#F7F3EA"/>
  <text x="860" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" fill="#1F2933">JUDIAgent Autonomous Workflow</text>
  <text x="860" y="122" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="31" fill="#52606D">ReAct-style tool loop for open-ended development help</text>

  <rect x="54" y="312" width="248" height="132" rx="24" fill="#E6EEF5" stroke="#243B53" stroke-width="3"/>
  <text x="178" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#102A43">User Goal</text>
  <text x="178" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#486581">question or task</text>

  <rect x="346" y="246" width="356" height="262" rx="26" fill="#E7F4EC" stroke="#243B53" stroke-width="3"/>
  <text x="524" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#102A43">Reason + Plan</text>
  <text x="524" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#243B53">next action</text>
