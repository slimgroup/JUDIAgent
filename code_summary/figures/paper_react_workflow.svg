  <rect width="1820" height="980" rx="32" fill="#F7F3EA"/>
  <text x="910" y="84" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#1F2933">JUDIAgent Autonomous Workflow</text>
  <text x="910" y="132" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="35" fill="#52606D">ReAct-style tool loop for open-ended development help</text>

  <rect x="60" y="338" width="270" height="144" rx="24" fill="#E6EEF5" stroke="#243B53" stroke-width="3"/>
  <text x="195" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="45" font-weight="700" fill="#102A43">User Goal</text>
  <text x="195" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#486581">question or task</text>

  <rect x="382" y="256" width="384" height="286" rx="26" fill="#E7F4EC" stroke="#243B53" stroke-width="3"/>
  <text x="574" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="49" font-weight="700" fill="#102A43">Reason + Plan</text>
  <text x="574" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#243B53">next action</text>
