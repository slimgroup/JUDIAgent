  <text x="574" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#486581">ReAct node</text>

  <rect x="826" y="164" width="382" height="182" rx="24" fill="#FCE7D8" stroke="#243B53" stroke-width="3"/>
  <text x="1017" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="47" font-weight="700" fill="#102A43">Retrieval Tools</text>
  <text x="1017" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#243B53">examples + docs</text>

  <rect x="826" y="458" width="382" height="182" rx="24" fill="#FCE7D8" stroke="#243B53" stroke-width="3"/>
  <text x="1017" y="537" text-anchor="middle" font-family="Arial, sans-serif" font-size="47" font-weight="700" fill="#102A43">Execution Tools</text>
  <text x="1017" y="596" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#243B53">Julia, shell, files</text>

  <rect x="1268" y="256" width="428" height="302" rx="26" fill="#F2E8F5" stroke="#243B53" stroke-width="3"/>
