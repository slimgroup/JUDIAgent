  <text x="1482" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#243B53">read tool outputs</text>
  <text x="1482" y="457" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#243B53">continue or stop</text>
  <text x="1482" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#486581">control loop</text>

  <rect x="1398" y="706" width="172" height="116" rx="20" fill="#E7F4EC" stroke="#243B53" stroke-width="3"/>
  <text x="1484" y="781" text-anchor="middle" font-family="Arial, sans-serif" font-size="45" font-weight="700" fill="#102A43">DONE</text>

